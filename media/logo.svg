<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <!-- Notepad icon -->
  <g transform="translate(400, 80)">
    <!-- Notepad body -->
    <rect x="-38" y="-42" width="76" height="94" rx="6" ry="6" fill="#699D68"/>
    <!-- Spiral binding dots -->
    <circle cx="-20" cy="-42" r="5" fill="#494368"/>
    <circle cx="0"   cy="-42" r="5" fill="#494368"/>
    <circle cx="20"  cy="-42" r="5" fill="#494368"/>
    <!-- Ruled lines -->
    <line x1="-24" y1="-18" x2="24" y2="-18" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-24" y1="-2"  x2="24" y2="-2"  stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-24" y1="14"  x2="16" y2="14"  stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Pencil -->
    <g transform="translate(34, 34) rotate(-45)">
      <rect x="-4" y="-28" width="8" height="36" rx="2" fill="#494368"/>
      <polygon points="-4,8 4,8 0,16" fill="#494368"/>
      <rect x="-4" y="-34" width="8" height="8" rx="1" fill="#a08060"/>
    </g>
  </g>

  <!-- "awesome" -->
  <text
    x="400" y="210"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="80"
    font-weight="700"
    letter-spacing="-1"
    fill="#494368">awesome</text>

  <!-- "note-taking" -->
  <text
    x="400" y="286"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="300"
    letter-spacing="1"
    fill="#699D68">note-taking</text>

  <!-- Tagline -->
  <text
    x="400" y="340"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="18"
    fill="#494368"
    opacity="0.55">Curating the best note-taking apps and resources</text>
</svg>
